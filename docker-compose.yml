services:
  postgres:
    image: postgres:16-alpine
    container_name: polymarket-postgres
    environment:
      POSTGRES_USER: polymarket
      POSTGRES_PASSWORD: polymarket
      POSTGRES_DB: polymarket
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polymarket -d polymarket"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
