services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: polymarket-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://polymarket:polymarket@postgres:5432/polymarket
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - TRADING_MODE=${TRADING_MODE:-paper}
      - API_PORT=8080
      - SCAN_INTERVAL_SECS=${SCAN_INTERVAL_SECS:-300}
      - INITIAL_BANKROLL=${INITIAL_BANKROLL:-50}
      - KELLY_FRAC=${KELLY_FRAC:-0.25}
      - MIN_EDGE=${MIN_EDGE:-0.05}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    container_name: polymarket-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: polymarket
      POSTGRES_PASSWORD: polymarket
      POSTGRES_DB: polymarket
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polymarket -d polymarket"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
